<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>都道府県シルエットクイズ</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;font-family:'Noto Sans JP',sans-serif;color:#2d2d48;overflow-x:hidden;}
  body{
    background:
      radial-gradient(ellipse at 10% 0%,rgba(108,99,255,.12) 0%,transparent 55%),
      radial-gradient(ellipse at 90% 100%,rgba(255,107,107,.09) 0%,transparent 55%),
      #f0f4ff;
    min-height:100vh;
  }

  /* ヘッダー */
  #header{
    text-align:center;padding:20px 16px 0;
    font-family:'Kaisei Decol',serif;
    font-size:clamp(1.3rem,5.5vw,1.8rem);
    font-weight:700;color:#6c63ff;
    letter-spacing:.04em;
  }
  #header .icon{font-size:1.15em;margin-right:6px;}

  /* スコア */
  #score{
    display:inline-flex;align-items:center;gap:5px;
    background:#6c63ff;color:#fff;
    border-radius:24px;padding:5px 16px;
    font-size:.85rem;font-weight:700;
    box-shadow:0 2px 10px rgba(108,99,255,.28);
    margin:10px 0 0 16px;
  }
  #score .sc{font-size:1.1rem;color:#ffd93d;}
  #score .st{font-size:1.1rem;}

  /* 見出し */
  #question{
    text-align:center;color:#8888aa;
    padding:10px 16px 0;font-size:.95rem;font-weight:500;
  }

  /* カード */
  #card{
    margin:10px 16px 0;background:#fff;
    border-radius:22px;padding:16px;
    box-shadow:0 4px 24px rgba(108,99,255,.13);
    border:2px solid #e8e8f8;
    position:relative;overflow:hidden;
  }
  #card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,#6c63ff,#ff6b6b,#ffd93d);
  }

  /* シルエット枠 */
  #svgbox{
    width:100%;aspect-ratio:1/1;
    background:linear-gradient(135deg,#f5f6ff,#eaecff);
    border-radius:14px;border:2px solid #e8e8f8;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  #svgbox svg{width:82%;height:82%;display:block;}
  #svgbox svg path{
    fill:#6c63ff;opacity:.88;
    filter:drop-shadow(0 3px 8px rgba(108,99,255,.35));
    transition:fill .3s,filter .3s;
  }
  #svgbox svg.correct path{fill:#06d6a0;filter:drop-shadow(0 3px 12px rgba(6,214,160,.45));}
  #svgbox svg.wrong   path{fill:#ff6b6b;filter:drop-shadow(0 3px 12px rgba(255,107,107,.45));}

  /* ローディング・エラー */
  #loading{text-align:center;padding:40px 0;color:#8888aa;font-size:.9rem;}
  .spinner{
    width:32px;height:32px;margin:0 auto 10px;
    border:3px solid #e0e0f0;border-top-color:#6c63ff;
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #err{color:#ff6b6b;text-align:center;padding:20px;font-size:.85rem;line-height:1.7;display:none;}

  /* フィードバック */
  #feedback{
    min-height:38px;text-align:center;
    padding:8px 0 2px;
    font-family:'Kaisei Decol',serif;
    font-size:1.15rem;font-weight:700;
    transition:opacity .3s;
  }
  #feedback.correct{color:#06d6a0;}
  #feedback.wrong{color:#ff6b6b;}
  #answerReveal{text-align:center;color:#8888aa;font-size:.85rem;min-height:18px;font-weight:500;}

  /* 選択肢 */
  #options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 16px 0;}
  .btn{
    background:#fff;border:2.5px solid #e0e0f0;border-radius:16px;
    color:#2d2d48;font-family:'Noto Sans JP',sans-serif;
    font-size:clamp(.88rem,3.8vw,1.05rem);font-weight:700;
    padding:14px 8px;cursor:pointer;text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    transition:border-color .18s,background .18s,transform .12s;
    -webkit-tap-highlight-color:transparent;min-height:52px;
  }
  .btn:active:not(:disabled){transform:scale(.96);}
  .btn:disabled{cursor:default;transform:none;}
  .btn.ok{border-color:#06d6a0;color:#06d6a0;background:rgba(6,214,160,.10);}
  .btn.ng{border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,.10);}
  .btn.dim{opacity:.3;}

  /* 次へボタン */
  #nextbtn{
    display:none;margin:12px 16px 0;
    width:calc(100% - 32px);
    background:linear-gradient(135deg,#6c63ff,#8b85ff);
    border:none;border-radius:16px;color:#fff;
    font-family:'Kaisei Decol',serif;
    font-size:1.08rem;font-weight:700;letter-spacing:.07em;
    padding:15px;cursor:pointer;
    box-shadow:0 4px 16px rgba(108,99,255,.32);
    -webkit-tap-highlight-color:transparent;
  }
  #nextbtn.show{display:block;}
  #nextbtn:active{opacity:.88;transform:scale(.98);}

  /* 結果画面 */
  #result{display:none;text-align:center;padding:48px 20px 32px;}
  #result.show{display:block;}
  #result .emoji{font-size:4rem;margin-bottom:8px;}
  #result h2{font-family:'Kaisei Decol',serif;color:#6c63ff;font-size:2rem;margin-bottom:16px;}
  #result .scoretxt{
    font-family:'Kaisei Decol',serif;font-size:4rem;font-weight:700;
    color:#6c63ff;line-height:1;margin-bottom:8px;
  }
  #result .scoretxt span{font-size:1.5rem;color:#8888aa;}
  #result .msg{
    color:#8888aa;font-size:.95rem;line-height:1.7;
    background:#fff;border-radius:16px;padding:14px 20px;
    border:2px solid #e8e8f8;margin-bottom:24px;
  }
  #retrybtn{
    background:linear-gradient(135deg,#6c63ff,#8b85ff);
    border:none;border-radius:16px;color:#fff;
    font-family:'Kaisei Decol',serif;
    font-size:1.1rem;font-weight:700;letter-spacing:.08em;
    padding:15px 48px;cursor:pointer;
    box-shadow:0 4px 18px rgba(108,99,255,.32);
  }

  /* フェードイン */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .fadein{animation:fadeUp .35s ease both;}
</style>
</head>
<body>

<div id="header"><span class="icon">🗾</span>都道府県シルエットクイズ</div>

<div id="score">
  <span>正答数</span>
  <span class="sc" id="sc">0</span>
  <span>/</span>
  <span class="st" id="st">0</span>
</div>

<p id="question">このシルエットは、どこの都道府県でしょう？</p>

<div id="card">
  <div id="svgbox">
    <div id="loading"><div class="spinner"></div>読み込み中…</div>
    <div id="err"></div>
  </div>
  <div id="feedback"></div>
  <div id="answerReveal"></div>
</div>

<div id="options">
  <button class="btn" id="b0"></button>
  <button class="btn" id="b1"></button>
  <button class="btn" id="b2"></button>
  <button class="btn" id="b3"></button>
</div>
<button id="nextbtn">次の問題へ ▶</button>

<div id="result">
  <div class="emoji" id="remoji">🎉</div>
  <h2>クイズ終了！</h2>
  <div class="scoretxt"><span id="rsc">0</span><span id="rst"> / 47</span></div>
  <div class="msg" id="rmsg"></div>
  <button id="retrybtn" onclick="init()">もう一度挑戦する 🔄</button>
</div>

<script>
// PWA：Service Worker登録
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./service-worker.js').catch(function(){});
  });
}

var prefs=[], order=[], idx=0, answered=false, correct=0, total=0;

fetch('./japan.topojson')
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(topo){
    var sx=topo.transform.scale[0], sy=topo.transform.scale[1];
    var tx=topo.transform.translate[0], ty=topo.transform.translate[1];

    var arcs=topo.arcs.map(function(arc){
      var x=0,y=0;
      return arc.map(function(p){ x+=p[0]; y+=p[1]; return [x*sx+tx, y*sy+ty]; });
    });

    function ring(indices){
      var pts=[];
      for(var i=0;i<indices.length;i++){
        var n=indices[i];
        var arc=n<0?arcs[~n].slice().reverse():arcs[n];
        for(var j=0;j<arc.length;j++) if(j>0||pts.length===0) pts.push(arc[j]);
      }
      return pts;
    }

    // ポリゴンの面積を計算（座標系での近似値）
    function polyArea(pts){
      var area=0;
      for(var i=0,j=pts.length-1;i<pts.length;j=i++){
        area+=(pts[j][0]+pts[i][0])*(pts[j][1]-pts[i][1]);
      }
      return Math.abs(area/2);
    }

    // 東京都のみ最大面積ポリゴン（本州部分）だけを返す
    // それ以外の都道府県は全ポリゴンをそのまま返す
    function getRings(geom, name){
      var rs=[];
      if(geom.type==='Polygon'){
        for(var i=0;i<geom.arcs.length;i++) rs.push(ring(geom.arcs[i]));
      } else if(geom.type==='MultiPolygon'){
        if(name==='東京都'){
          // 東京都だけ：最大面積のポリゴンのみ使用
          var best=null, bestArea=0;
          for(var i=0;i<geom.arcs.length;i++){
            var outerPts=ring(geom.arcs[i][0]);
            var area=polyArea(outerPts);
            if(area>bestArea){ bestArea=area; best=i; }
          }
          if(best!==null){
            for(var j=0;j<geom.arcs[best].length;j++) rs.push(ring(geom.arcs[best][j]));
          }
        } else {
          // それ以外：全ポリゴンをそのまま使用
          for(var i=0;i<geom.arcs.length;i++)
            for(var j=0;j<geom.arcs[i].length;j++) rs.push(ring(geom.arcs[i][j]));
        }
      }
      return rs;
    }

    function makeSVGData(rs){
      var minLng=1e9,maxLng=-1e9,minLat=1e9,maxLat=-1e9;
      for(var i=0;i<rs.length;i++)
        for(var j=0;j<rs[i].length;j++){
          var lng=rs[i][j][0],lat=rs[i][j][1];
          if(lng<minLng)minLng=lng; if(lng>maxLng)maxLng=lng;
          if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat;
        }
      var w=maxLng-minLng, h=maxLat-minLat, pad=Math.max(w,h)*0.05;
      var vb=(minLng-pad).toFixed(4)+' '+(-(maxLat+pad)).toFixed(4)+' '+(w+pad*2).toFixed(4)+' '+(h+pad*2).toFixed(4);
      var d='';
      for(var i=0;i<rs.length;i++){
        if(rs[i].length<2) continue;
        d+='M';
        for(var j=0;j<rs[i].length;j++){
          if(j>0) d+=' L';
          d+=rs[i][j][0].toFixed(4)+','+(-rs[i][j][1]).toFixed(4);
        }
        d+='Z ';
      }
      return {vb:vb.trim(), d:d.trim()};
    }

    var geoms=topo.objects.japan.geometries;
    for(var i=0;i<geoms.length;i++){
      var name=(geoms[i].properties||{}).nam_ja||'';
      if(!name) continue;
      var rs=getRings(geoms[i], name);
      if(!rs.length) continue;
      var data=makeSVGData(rs);
      if(!data.d) continue;
      prefs.push({name:name, vb:data.vb, d:data.d});
    }

    if(!prefs.length) throw new Error('データ0件');
    document.getElementById('loading').style.display='none';
    document.getElementById('st').textContent=prefs.length;
    document.getElementById('rst').textContent=' / '+prefs.length;
    init();
  })
  .catch(function(e){
    document.getElementById('loading').style.display='none';
    var el=document.getElementById('err');
    el.textContent='エラー: '+e.message;
    el.style.display='block';
  });

function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=b[i]; b[i]=b[j]; b[j]=t;
  }
  return b;
}

function init(){
  order=shuffle(prefs.map(function(_,i){return i;}));
  idx=0; correct=0; total=0; answered=false;
  document.getElementById('result').classList.remove('show');
  document.getElementById('card').style.display='';
  document.getElementById('options').style.display='';
  document.getElementById('nextbtn').classList.remove('show');
  document.getElementById('sc').textContent=0;
  document.getElementById('st').textContent=prefs.length;
  show();
}

function show(){
  answered=false;
  var fb=document.getElementById('feedback');
  fb.textContent=''; fb.className='';
  document.getElementById('answerReveal').textContent='';
  document.getElementById('nextbtn').classList.remove('show');

  var p=prefs[order[idx]];
  var box=document.getElementById('svgbox');
  var old=box.querySelector('svg');
  if(old) box.removeChild(old);

  // createElementNS で確実にSVG要素を生成（動作確認済みの方法）
  var svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('viewBox',p.vb);
  svgEl.setAttribute('preserveAspectRatio','xMidYMid meet');
  var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
  pathEl.setAttribute('d',p.d);
  svgEl.appendChild(pathEl);
  box.appendChild(svgEl);

  // カードをフェードイン
  var card=document.getElementById('card');
  card.classList.remove('fadein');
  void card.offsetWidth;
  card.classList.add('fadein');

  var cname=p.name;
  var pool=shuffle(prefs.map(function(x){return x.name;}).filter(function(n){return n!==cname;})).slice(0,3);
  var opts=shuffle([cname].concat(pool));
  var ids=['b0','b1','b2','b3'];
  for(var i=0;i<4;i++){
    var btn=document.getElementById(ids[i]);
    btn.textContent=opts[i]; btn.disabled=false; btn.className='btn';
    btn.onclick=(function(sel){ return function(){ answer(sel,cname); }; })(opts[i]);
  }
}

function answer(sel,cor){
  if(answered) return;
  answered=true; total++;
  var isOk=sel===cor;
  if(isOk) correct++;
  document.getElementById('sc').textContent=correct;
  document.getElementById('st').textContent=total;

  var svgEl=document.getElementById('svgbox').querySelector('svg');
  if(svgEl) svgEl.className=isOk?'correct':'wrong';

  var fb=document.getElementById('feedback');
  fb.textContent=isOk?'🎉 正解！':'❌ 不正解…';
  fb.className=isOk?'correct':'wrong';
  if(!isOk) document.getElementById('answerReveal').textContent='正解は「'+cor+'」';

  var ids=['b0','b1','b2','b3'];
  for(var i=0;i<4;i++){
    var btn=document.getElementById(ids[i]);
    btn.disabled=true;
    if(btn.textContent===cor&&!isOk) btn.className='btn ok';
    else if(btn.textContent===sel&&!isOk) btn.className='btn ng';
    else if(btn.textContent!==sel&&btn.textContent!==cor) btn.className='btn dim';
  }

  if(idx<prefs.length-1){
    document.getElementById('nextbtn').classList.add('show');
  } else {
    setTimeout(result,1200);
  }
}

document.getElementById('nextbtn').onclick=function(){ idx++; show(); };

function result(){
  document.getElementById('card').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('nextbtn').classList.remove('show');
  var rate=correct/prefs.length;
  document.getElementById('rsc').textContent=correct;
  document.getElementById('rst').textContent=' / '+prefs.length;
  document.getElementById('remoji').textContent=rate===1?'🏆':rate>=0.8?'🌟':rate>=0.6?'👍':rate>=0.4?'📚':'🗾';
  document.getElementById('rmsg').textContent=
    rate===1  ?'完璧です！全問正解、おめでとうございます🎊':
    rate>=0.8 ?'素晴らしい！地理の知識が豊富ですね🌟':
    rate>=0.6 ?'よくできました！あと少しで全問正解です💪':
    rate>=0.4 ?'半分以上正解！地道に練習しましょう📚':
               '難しかったですね。繰り返し挑戦してみましょう🗾';
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
