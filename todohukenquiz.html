<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>都道府県シルエットクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:0;background:#f0f4ff;font-family:'Noto Sans JP',sans-serif;color:#2d2d48;}
#header{text-align:center;padding:16px;font-size:1.4rem;font-weight:700;color:#6c63ff;}
#score{text-align:left;padding:0 16px 8px;font-size:.9rem;color:#6c63ff;font-weight:700;}
#question{text-align:center;color:#8888aa;padding:0 16px 8px;font-size:.95rem;}
#card{margin:0 16px;background:#fff;border-radius:20px;padding:16px;box-shadow:0 4px 20px rgba(108,99,255,.15);}

/* シルエット枠 - svgtest.htmlと同じ構造 */
#svgbox{
  width:100%;
  aspect-ratio:1/1;
  background:#eef0ff;
  border-radius:12px;
  border:2px solid #e0e0f0;
  display:flex;
  align-items:center;
  justify-content:center;
}
#svgbox svg{
  width:82%;
  height:82%;
  display:block;
}
#svgbox svg path{fill:#6c63ff;}
#svgbox svg.correct path{fill:#06d6a0;}
#svgbox svg.wrong path{fill:#ff6b6b;}

#loading{text-align:center;padding:40px;color:#8888aa;}
#err{color:#ff6b6b;text-align:center;padding:20px;display:none;}
#feedback{min-height:36px;text-align:center;padding:8px 0;font-size:1.1rem;font-weight:700;}
#feedback.correct{color:#06d6a0;}
#feedback.wrong{color:#ff6b6b;}
#answer{text-align:center;color:#8888aa;font-size:.85rem;min-height:20px;}
#options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 16px 0;}
.btn{background:#fff;border:2px solid #e0e0f0;border-radius:14px;padding:14px 8px;font-size:1rem;font-weight:700;color:#2d2d48;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:.8;}
.btn:disabled{cursor:default;}
.btn.ok{border-color:#06d6a0;color:#06d6a0;background:rgba(6,214,160,.1);}
.btn.ng{border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,.1);}
.btn.dim{opacity:.3;}
#nextbtn{display:none;margin:12px 16px 0;width:calc(100% - 32px);background:#6c63ff;border:none;border-radius:14px;color:#fff;font-size:1.05rem;font-weight:700;padding:15px;cursor:pointer;}
#nextbtn.show{display:block;}
#result{display:none;text-align:center;padding:40px 20px;}
#result.show{display:block;}
#result h2{color:#6c63ff;font-size:2rem;margin-bottom:12px;}
#result p{color:#8888aa;margin-bottom:20px;}
#retrybtn{background:#6c63ff;border:none;border-radius:14px;color:#fff;font-size:1.05rem;font-weight:700;padding:15px 40px;cursor:pointer;}
</style>
</head>
<body>

<div id="header">🗾 都道府県シルエットクイズ</div>
<div id="score">正答数 <span id="sc">0</span> / <span id="st">0</span></div>
<p id="question">このシルエットは、どこの都道府県でしょう？</p>

<div id="card">
  <div id="svgbox">
    <div id="loading">読み込み中…</div>
    <div id="err"></div>
    <!-- svgtest.htmlと全く同じ方法でSVGを生成・挿入する -->
  </div>
  <div id="feedback"></div>
  <div id="answer"></div>
</div>

<div id="options">
  <button class="btn" id="b0"></button>
  <button class="btn" id="b1"></button>
  <button class="btn" id="b2"></button>
  <button class="btn" id="b3"></button>
</div>
<button id="nextbtn">次の問題へ ▶</button>

<div id="result">
  <h2>クイズ終了！</h2>
  <p id="rmsg"></p>
  <button id="retrybtn" onclick="init()">もう一度挑戦する</button>
</div>

<script>
var prefs=[], order=[], idx=0, answered=false, correct=0, total=0;

fetch('./japan.topojson')
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(topo){
    var sx=topo.transform.scale[0], sy=topo.transform.scale[1];
    var tx=topo.transform.translate[0], ty=topo.transform.translate[1];

    // arcデコード（svgtest.htmlと同じ）
    var arcs=topo.arcs.map(function(arc){
      var x=0,y=0;
      return arc.map(function(p){ x+=p[0]; y+=p[1]; return [x*sx+tx, y*sy+ty]; });
    });

    function ring(indices){
      var pts=[];
      for(var i=0;i<indices.length;i++){
        var idx2=indices[i];
        var arc=idx2<0?arcs[~idx2].slice().reverse():arcs[idx2];
        for(var j=0;j<arc.length;j++) if(j>0||pts.length===0) pts.push(arc[j]);
      }
      return pts;
    }

    function rings(geom){
      var rs=[];
      if(geom.type==='Polygon'){
        for(var i=0;i<geom.arcs.length;i++) rs.push(ring(geom.arcs[i]));
      } else if(geom.type==='MultiPolygon'){
        for(var i=0;i<geom.arcs.length;i++)
          for(var j=0;j<geom.arcs[i].length;j++) rs.push(ring(geom.arcs[i][j]));
      }
      return rs;
    }

    function makeSVG(rs){
      var minLng=1e9,maxLng=-1e9,minLat=1e9,maxLat=-1e9;
      for(var i=0;i<rs.length;i++)
        for(var j=0;j<rs[i].length;j++){
          var lng=rs[i][j][0], lat=rs[i][j][1];
          if(lng<minLng)minLng=lng; if(lng>maxLng)maxLng=lng;
          if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat;
        }
      var w=maxLng-minLng, h=maxLat-minLat, pad=Math.max(w,h)*0.05;
      var vb=(minLng-pad).toFixed(4)+' '+(-(maxLat+pad)).toFixed(4)+' '+(w+pad*2).toFixed(4)+' '+(h+pad*2).toFixed(4);
      var d='';
      for(var i=0;i<rs.length;i++){
        if(rs[i].length<2) continue;
        d+='M';
        for(var j=0;j<rs[i].length;j++){
          if(j>0) d+=' L';
          d+=rs[i][j][0].toFixed(4)+','+(-rs[i][j][1]).toFixed(4);
        }
        d+='Z ';
      }
      return {vb:vb, d:d.trim()};
    }

    var geoms=topo.objects.japan.geometries;
    for(var i=0;i<geoms.length;i++){
      var name=(geoms[i].properties||{}).nam_ja||'';
      if(!name) continue;
      var rs=rings(geoms[i]);
      if(!rs.length) continue;
      var svg=makeSVG(rs);
      if(!svg.d) continue;
      prefs.push({name:name, vb:svg.vb, d:svg.d});
    }

    if(!prefs.length){ throw new Error('データ0件'); }
    document.getElementById('loading').style.display='none';
    document.getElementById('st').textContent=prefs.length;
    init();
  })
  .catch(function(e){
    document.getElementById('loading').style.display='none';
    var err=document.getElementById('err');
    err.textContent='エラー: '+e.message;
    err.style.display='block';
  });

function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=b[i];b[i]=b[j];b[j]=t; }
  return b;
}

function init(){
  order=shuffle(prefs.map(function(_,i){return i;}));
  idx=0; correct=0; total=0; answered=false;
  document.getElementById('result').classList.remove('show');
  document.getElementById('card').style.display='';
  document.getElementById('options').style.display='';
  document.getElementById('nextbtn').classList.remove('show');
  document.getElementById('sc').textContent=0;
  document.getElementById('st').textContent=prefs.length;
  show();
}

function show(){
  answered=false;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
  document.getElementById('answer').textContent='';
  document.getElementById('nextbtn').classList.remove('show');

  var p=prefs[order[idx]];

  // svgtest.htmlと同じ方法でSVGを挿入
  var box=document.getElementById('svgbox');
  // 既存SVGを削除
  var old=box.querySelector('svg');
  if(old) box.removeChild(old);

  var svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('viewBox', p.vb);
  svgEl.setAttribute('preserveAspectRatio','xMidYMid meet');
  var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
  pathEl.setAttribute('d', p.d);
  svgEl.appendChild(pathEl);
  box.appendChild(svgEl);

  var cname=p.name;
  var pool=prefs.map(function(x){return x.name;}).filter(function(n){return n!==cname;});
  pool=shuffle(pool).slice(0,3);
  var opts=shuffle([cname].concat(pool));

  var btns=['b0','b1','b2','b3'];
  for(var i=0;i<4;i++){
    var btn=document.getElementById(btns[i]);
    btn.textContent=opts[i];
    btn.disabled=false;
    btn.className='btn';
    btn.onclick=(function(sel){
      return function(){ answer(sel,cname); };
    })(opts[i]);
  }
}

function answer(sel,cor){
  if(answered) return;
  answered=true; total++;
  var isOk=sel===cor;
  if(isOk) correct++;
  document.getElementById('sc').textContent=correct;
  document.getElementById('st').textContent=total;

  var box=document.getElementById('svgbox');
  var svgEl=box.querySelector('svg');
  if(svgEl) svgEl.className=isOk?'correct':'wrong';

  var fb=document.getElementById('feedback');
  fb.textContent=isOk?'🎉 正解！':'❌ 不正解…';
  fb.className=isOk?'correct':'wrong';

  if(!isOk){
    document.getElementById('answer').textContent='正解は「'+cor+'」';
  }

  var btns=['b0','b1','b2','b3'];
  for(var i=0;i<4;i++){
    var btn=document.getElementById(btns[i]);
    btn.disabled=true;
    if(btn.textContent===cor&&!isOk) btn.className='btn ok';
    else if(btn.textContent===sel&&!isOk) btn.className='btn ng';
    else if(btn.textContent!==sel) btn.className='btn dim';
  }

  if(idx<prefs.length-1){
    document.getElementById('nextbtn').classList.add('show');
  } else {
    setTimeout(result,1200);
  }
}

document.getElementById('nextbtn').onclick=function(){ idx++; show(); };

function result(){
  document.getElementById('card').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('nextbtn').classList.remove('show');
  var rate=correct/prefs.length;
  document.getElementById('rmsg').textContent=
    '正解数: '+correct+' / '+prefs.length+'問\n'+
    (rate===1?'完璧！全問正解🎊':rate>=0.8?'素晴らしい🌟':rate>=0.6?'よくできました👍':rate>=0.4?'頑張りました📚':'また挑戦しよう🗾');
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
