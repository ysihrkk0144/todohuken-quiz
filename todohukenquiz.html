<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>都道府県別シルエットクイズ</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1520;
    --surface: #0f1e2e;
    --card: #132438;
    --accent: #1db88a;
    --accent2: #f0a500;
    --wrong: #e05555;
    --text: #e8f0f8;
    --muted: #6a8aaa;
    --border: #1e3a55;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
  }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(29,184,138,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(240,165,0,0.06) 0%, transparent 60%),
      var(--bg);
  }

  /* ── HEADER ── */
  #app-header {
    text-align: center;
    padding: 18px 16px 0;
  }
  #app-title {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.2rem, 5vw, 1.7rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, #1db88a, #4dd4ac, #f0a500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    filter: drop-shadow(0 0 12px rgba(29,184,138,0.4));
  }
  #app-title .icon { font-size: 1.3em; margin-right: 6px; -webkit-text-fill-color: initial; filter: none; }

  /* ── SCORE BAR ── */
  #score-bar {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding: 10px 16px 0;
  }
  #score-display {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.85rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #score-display .label { color: var(--muted); }
  #score-correct { color: var(--accent); font-weight: 700; font-size: 1rem; }
  #score-total { color: var(--text); font-weight: 700; font-size: 1rem; }
  #score-display .sep { color: var(--border); }

  /* ── MAIN ── */
  #main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 16px 24px;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── QUESTION HEADING ── */
  #question-heading {
    font-size: clamp(0.85rem, 3.5vw, 1rem);
    color: var(--muted);
    letter-spacing: 0.03em;
    text-align: center;
    line-height: 1.5;
  }

  /* ── QUIZ CARD ── */
  #quiz-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  #quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  /* ── PREFECTURE NAME HINT ── */
  #pref-region {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── SVG FRAME ── */
  #silhouette-frame {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,21,32,0.6);
    border-radius: 12px;
    border: 1px solid rgba(30,58,85,0.5);
    position: relative;
    overflow: hidden;
  }
  #silhouette-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(29,184,138,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  #silhouette-svg {
    width: 88%;
    height: 88%;
    transition: opacity 0.3s;
  }
  #silhouette-svg path, #silhouette-svg polygon, #silhouette-svg rect {
    fill: var(--accent);
    opacity: 0.85;
    filter: drop-shadow(0 0 8px rgba(29,184,138,0.5));
    transition: fill 0.4s, opacity 0.4s;
  }
  #silhouette-svg.correct path, #silhouette-svg.correct polygon, #silhouette-svg.correct rect {
    fill: var(--accent);
    opacity: 1;
    filter: drop-shadow(0 0 16px rgba(29,184,138,0.9));
  }
  #silhouette-svg.wrong path, #silhouette-svg.wrong polygon, #silhouette-svg.wrong rect {
    fill: var(--wrong);
    opacity: 1;
    filter: drop-shadow(0 0 16px rgba(224,85,85,0.8));
  }

  /* ── FEEDBACK ── */
  #feedback-area {
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #feedback-text {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }
  #feedback-text.show { opacity: 1; transform: translateY(0); }
  #feedback-text.correct { color: var(--accent); }
  #feedback-text.wrong { color: var(--wrong); }
  #answer-reveal {
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s 0.15s;
  }
  #answer-reveal.show { opacity: 1; }

  /* ── OPTIONS ── */
  #options-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .opt-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(0.85rem, 3.5vw, 1rem);
    font-weight: 500;
    padding: 14px 8px;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s, border-color 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    min-height: 52px;
  }
  .opt-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
    pointer-events: none;
  }
  .opt-btn:active { transform: scale(0.97); }
  .opt-btn:disabled { cursor: default; transform: none; }
  .opt-btn.correct-answer {
    background: rgba(29,184,138,0.2);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 16px rgba(29,184,138,0.25);
  }
  .opt-btn.wrong-answer {
    background: rgba(224,85,85,0.15);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .opt-btn.dimmed {
    opacity: 0.35;
  }

  /* ── NEXT BUTTON ── */
  #next-btn {
    width: 100%;
    background: linear-gradient(135deg, #1db88a, #15976f);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Kaisei Decol', serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 16px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(29,184,138,0.35);
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    display: none;
    -webkit-tap-highlight-color: transparent;
  }
  #next-btn:active { transform: scale(0.98); opacity: 0.9; }
  #next-btn.visible { display: block; }

  /* ── RESULT SCREEN ── */
  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    padding: 32px 16px;
    max-width: 480px;
    margin: 0 auto;
  }
  #result-screen.show { display: flex; }
  #result-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #result-score-big {
    font-family: 'Kaisei Decol', serif;
    font-size: 4rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(29,184,138,0.5));
  }
  #result-score-big span { font-size: 1.5rem; color: var(--muted); }
  #result-msg {
    font-size: 1rem;
    color: var(--muted);
    line-height: 1.6;
  }
  #restart-btn {
    background: linear-gradient(135deg, var(--accent), #15976f);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Kaisei Decol', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 16px 48px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(29,184,138,0.4);
    -webkit-tap-highlight-color: transparent;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.4s ease both; }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(29,184,138,0.5)); }
    50%       { filter: drop-shadow(0 0 20px rgba(29,184,138,0.9)); }
  }
  #silhouette-svg { animation: pulse-glow 3s ease-in-out infinite; }
  #silhouette-svg.correct { animation: none; }
  #silhouette-svg.wrong   { animation: none; }
</style>
</head>

// ─────────────────────────────────────────────
// ゲームロジック
// ─────────────────────────────────────────────
let questionOrder = [];
let currentIndex = 0;
let answered = false;
let correctCount = 0;
let totalAnswered = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questionOrder = shuffle(PREFECTURES.map((_, i) => i));
  currentIndex = 0;
  correctCount = 0;
  totalAnswered = 0;
  answered = false;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('main').style.display = '';
  document.getElementById('score-bar').style.display = '';
  updateScore();
  loadQuestion();
}

function updateScore() {
  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-total').textContent = totalAnswered;
}

function loadQuestion() {
  answered = false;
  document.getElementById('next-btn').classList.remove('visible');

  const fb = document.getElementById('feedback-text');
  const ar = document.getElementById('answer-reveal');
  fb.classList.remove('show','correct','wrong');
  ar.classList.remove('show');
  ar.textContent = '';

  const pref = PREFECTURES[questionOrder[currentIndex]];

  // シルエット更新
  const svg = document.getElementById('silhouette-svg');
  svg.setAttribute('viewBox', pref.viewBox);
  svg.innerHTML = `<path d="${pref.path}"/>`;
  svg.className = '';

  // 地方表示
  document.getElementById('pref-region').textContent = pref.region + '地方';

  // 選択肢生成
  const correctName = pref.name;
  let pool = PREFECTURES.map(p => p.name).filter(n => n !== correctName);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correctName, ...wrongs]);

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.textContent = options[i];
    btn.disabled = false;
    btn.className = 'opt-btn';
    btn.onclick = () => checkAnswer(options[i], correctName, btn, options);
  });

  // フェードイン
  document.getElementById('quiz-card').classList.remove('fade-in');
  void document.getElementById('quiz-card').offsetWidth;
  document.getElementById('quiz-card').classList.add('fade-in');
}

function checkAnswer(selected, correct, clickedBtn, options) {
  if (answered) return;
  answered = true;
  totalAnswered++;

  const isCorrect = selected === correct;
  if (isCorrect) correctCount++;
  updateScore();

  const svg = document.getElementById('silhouette-svg');
  const fb = document.getElementById('feedback-text');
  const ar = document.getElementById('answer-reveal');

  if (isCorrect) {
    svg.className = 'correct';
    fb.textContent = '🎉 正解！';
    fb.className = 'correct show';
    clickedBtn.classList.add('correct-answer');
  } else {
    svg.className = 'wrong';
    fb.textContent = '❌ 不正解…';
    fb.className = 'wrong show';
    ar.textContent = `正解は「${correct}」`;
    ar.classList.add('show');
    clickedBtn.classList.add('wrong-answer');
  }

  // 全ボタン処理
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === correct && !isCorrect) {
      btn.classList.add('correct-answer');
    } else if (btn !== clickedBtn) {
      btn.classList.add('dimmed');
    }
  });

  // 次へボタン or 結果
  if (currentIndex < PREFECTURES.length - 1) {
    document.getElementById('next-btn').classList.add('visible');
  } else {
    setTimeout(showResult, 1200);
  }
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentIndex++;
  loadQuestion();
});

function showResult() {
  document.getElementById('main').style.display = 'none';
  document.getElementById('score-bar').style.display = 'none';
  document.getElementById('rs-correct').textContent = correctCount;

  let msg = '';
  const rate = correctCount / 47;
  if (rate === 1) msg = '完璧です！全問正解、おめでとうございます🎊';
  else if (rate >= 0.8) msg = '素晴らしい！地理の知識が豊富ですね🌟';
  else if (rate >= 0.6) msg = 'よくできました！あと少しで全問正解です💪';
  else if (rate >= 0.4) msg = '半分以上正解！地道に練習しましょう📚';
  else msg = '難しかったですね。繰り返し挑戦してみましょう🗾';

  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-screen').classList.add('show');
}

// PWA Service Worker登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}

// 起動
startQuiz();
</script>
