<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>都道府県別シルエットクイズ</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1520;--surface:#0f1e2e;--card:#132438;
    --accent:#1db88a;--accent2:#f0a500;--wrong:#e05555;
    --text:#e8f0f8;--muted:#6a8aaa;--border:#1e3a55;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% 10%,rgba(29,184,138,0.08) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 80%,rgba(240,165,0,0.06) 0%,transparent 60%),
      var(--bg);
  }
  #app-header{text-align:center;padding:18px 16px 0;}
  #app-title{
    font-family:'Kaisei Decol',serif;font-size:clamp(1.2rem,5vw,1.7rem);font-weight:700;
    letter-spacing:.05em;
    background:linear-gradient(135deg,#1db88a,#4dd4ac,#f0a500);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 12px rgba(29,184,138,0.4));
  }
  #app-title .icon{font-size:1.3em;margin-right:6px;-webkit-text-fill-color:initial;filter:none;}
  #score-bar{display:flex;justify-content:flex-start;padding:10px 16px 0;}
  #score-display{
    background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:5px 14px;font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:6px;
  }
  #score-correct{color:var(--accent);font-weight:700;font-size:1rem;}
  #score-total{color:var(--text);font-weight:700;font-size:1rem;}
  #score-display .sep{color:var(--border);}
  #main{
    display:flex;flex-direction:column;align-items:center;
    padding:10px 16px 24px;gap:12px;max-width:480px;margin:0 auto;
  }
  #question-heading{font-size:clamp(.85rem,3.5vw,1rem);color:var(--muted);letter-spacing:.03em;text-align:center;}
  #quiz-card{
    width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:16px;box-shadow:0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05);
    position:relative;overflow:hidden;
  }
  #quiz-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6;
  }
  #silhouette-frame{
    width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
    background:rgba(10,21,32,0.6);border-radius:12px;border:1px solid rgba(30,58,85,0.5);
    position:relative;overflow:hidden;
  }
  #silhouette-svg{width:88%;height:88%;display:none;}
  #silhouette-svg path{
    fill:var(--accent);opacity:.85;
    filter:drop-shadow(0 0 6px rgba(29,184,138,0.5));
    transition:fill .4s,opacity .4s,filter .4s;
  }
  #silhouette-svg.correct path{fill:var(--accent);opacity:1;filter:drop-shadow(0 0 20px rgba(29,184,138,0.95));}
  #silhouette-svg.wrong path{fill:var(--wrong);opacity:1;filter:drop-shadow(0 0 18px rgba(224,85,85,0.85));}
  #loading-area{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:12px;padding:30px 0;color:var(--muted);font-size:.88rem;
  }
  #error-msg{color:var(--wrong);font-size:.82rem;text-align:center;padding:20px;line-height:1.7;display:none;}
  #error-msg.show{display:block;}
  #feedback-area{
    min-height:40px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:4px;margin-top:10px;
  }
  #feedback-text{
    font-family:'Kaisei Decol',serif;font-size:1.1rem;font-weight:700;text-align:center;
    opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s;
  }
  #feedback-text.show{opacity:1;transform:translateY(0);}
  #feedback-text.correct{color:var(--accent);}
  #feedback-text.wrong{color:var(--wrong);}
  #answer-reveal{font-size:.82rem;color:var(--muted);text-align:center;opacity:0;transition:opacity .3s .15s;}
  #answer-reveal.show{opacity:1;}
  #options-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt-btn{
    background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
    color:var(--text);font-family:'Noto Sans JP',sans-serif;
    font-size:clamp(.85rem,3.5vw,1rem);font-weight:500;
    padding:14px 8px;cursor:pointer;text-align:center;
    transition:background .2s,border-color .2s,transform .1s;
    -webkit-tap-highlight-color:transparent;min-height:52px;
  }
  .opt-btn:active{transform:scale(0.97);}
  .opt-btn:disabled{cursor:default;transform:none;}
  .opt-btn.correct-answer{background:rgba(29,184,138,0.2);border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px rgba(29,184,138,0.25);}
  .opt-btn.wrong-answer{background:rgba(224,85,85,0.15);border-color:var(--wrong);color:var(--wrong);}
  .opt-btn.dimmed{opacity:.35;}
  #next-btn{
    width:100%;background:linear-gradient(135deg,#1db88a,#15976f);
    border:none;border-radius:14px;color:#fff;
    font-family:'Kaisei Decol',serif;font-size:1.05rem;font-weight:700;
    letter-spacing:.08em;padding:16px;cursor:pointer;
    box-shadow:0 4px 20px rgba(29,184,138,0.35);
    transition:opacity .2s,transform .15s;display:none;
    -webkit-tap-highlight-color:transparent;
  }
  #next-btn:active{transform:scale(0.98);opacity:.9;}
  #next-btn.visible{display:block;}
  #result-screen{
    display:none;flex-direction:column;align-items:center;gap:20px;
    text-align:center;padding:32px 16px;max-width:480px;margin:0 auto;
  }
  #result-screen.show{display:flex;}
  #result-title{
    font-family:'Kaisei Decol',serif;font-size:1.8rem;font-weight:700;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  #result-score-big{
    font-family:'Kaisei Decol',serif;font-size:4rem;font-weight:700;
    color:var(--accent);line-height:1;filter:drop-shadow(0 0 20px rgba(29,184,138,0.5));
  }
  #result-score-big span{font-size:1.5rem;color:var(--muted);}
  #result-msg{font-size:1rem;color:var(--muted);line-height:1.6;}
  #restart-btn{
    background:linear-gradient(135deg,var(--accent),#15976f);
    border:none;border-radius:14px;color:#fff;
    font-family:'Kaisei Decol',serif;font-size:1.1rem;font-weight:700;
    letter-spacing:.1em;padding:16px 48px;cursor:pointer;
    box-shadow:0 4px 24px rgba(29,184,138,0.4);
    -webkit-tap-highlight-color:transparent;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn .4s ease both;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes pulse-glow{
    0%,100%{filter:drop-shadow(0 0 6px rgba(29,184,138,0.5));}
    50%{filter:drop-shadow(0 0 18px rgba(29,184,138,0.9));}
  }
  #silhouette-svg{animation:pulse-glow 3s ease-in-out infinite;}
  #silhouette-svg.correct,#silhouette-svg.wrong{animation:none;}
</style>
</head>
<body>

<header id="app-header">
  <h1 id="app-title"><span class="icon">🗾</span>都道府県別シルエットクイズ</h1>
</header>

<div id="score-bar">
  <div id="score-display">
    <span class="label">正答数</span>
    <span id="score-correct">0</span>
    <span class="sep">/</span>
    <span id="score-total">0</span>
  </div>
</div>

<main id="main">
  <p id="question-heading">このシルエットは、どこの都道府県でしょう？</p>
  <div id="quiz-card">
    <div id="silhouette-frame">
      <div id="loading-area">
        <div class="spinner"></div>
        <span>地図データを読み込み中…</span>
      </div>
      <div id="error-msg"></div>
      <svg id="silhouette-svg" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="feedback-area">
      <div id="feedback-text"></div>
      <div id="answer-reveal"></div>
    </div>
  </div>
  <div id="options-grid">
    <button class="opt-btn" id="opt0"></button>
    <button class="opt-btn" id="opt1"></button>
    <button class="opt-btn" id="opt2"></button>
    <button class="opt-btn" id="opt3"></button>
  </div>
  <button id="next-btn">次の問題へ ▶</button>
</main>

<div id="result-screen">
  <div id="result-title">クイズ終了！</div>
  <div id="result-score-big"><span id="rs-correct">0</span><span id="rs-total"> / 47</span></div>
  <div id="result-msg"></div>
  <button id="restart-btn" onclick="startQuiz()">もう一度挑戦する</button>
</div>

<script>
// ============================================================
// japan.topojson の確認済み構造：
//   transform.scale  = [0.003105..., 0.002513...]
//   transform.translate = [122.933..., 20.422...]
//   objects.japan.geometries[i].properties = {nam, nam_ja, id}
//   座標は量子化差分整数 → scale/translateで経度緯度に変換
//   経度(lng): 122〜154, 緯度(lat): 20〜46
//   SVGはY軸が下向きなので緯度は反転必要
// ============================================================

let prefData = [];
let questionOrder = [];
let currentIndex = 0;
let answered = false;
let correctCount = 0;
let totalAnswered = 0;

async function loadTopoJSON() {
  const loadEl = document.getElementById('loading-area');
  const errEl  = document.getElementById('error-msg');
  const svgEl  = document.getElementById('silhouette-svg');

  try {
    const res = await fetch('./japan.topojson');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const topo = await res.json();

    const sx = topo.transform.scale[0];
    const sy = topo.transform.scale[1];
    const tx = topo.transform.translate[0];
    const ty = topo.transform.translate[1];

    // 量子化差分座標 → 経度・緯度
    // 各arcは差分値の配列。累積和してからscale/translateで実座標へ
    function decodeArc(arc) {
      let x = 0, y = 0;
      return arc.map(([dx, dy]) => {
        x += dx; y += dy;
        // lng = x*sx + tx, lat = y*sy + ty
        return [x * sx + tx, y * sy + ty];
      });
    }

    // 全arcをデコード（一度だけ）
    const arcs = topo.arcs.map(decodeArc);

    // アーク番号リスト → 座標列
    function resolveRing(indices) {
      const pts = [];
      for (const idx of indices) {
        const arc = idx < 0 ? [...arcs[~idx]].reverse() : arcs[idx];
        for (let i = 0; i < arc.length; i++) {
          if (i > 0 || pts.length === 0) pts.push(arc[i]);
        }
      }
      return pts;
    }

    // ジオメトリ → 座標リング群（経度・緯度）
    function geomToRings(geom) {
      const rings = [];
      if (geom.type === 'Polygon') {
        for (const r of geom.arcs) rings.push(resolveRing(r));
      } else if (geom.type === 'MultiPolygon') {
        for (const poly of geom.arcs) for (const r of poly) rings.push(resolveRing(r));
      }
      return rings;
    }

    // 経度・緯度リング → SVGパス
    // lng → x（そのまま）, lat → y（反転：大きいlatが上＝小さいy）
    // viewBox単位は経度・緯度のまま使用し、Y軸だけ反転
    function makePathAndViewBox(rings) {
      // バウンディングボックス
      let minLng=Infinity, maxLng=-Infinity, minLat=Infinity, maxLat=-Infinity;
      for (const pts of rings) {
        for (const [lng, lat] of pts) {
          if (lng < minLng) minLng = lng; if (lng > maxLng) maxLng = lng;
          if (lat < minLat) minLat = lat; if (lat > maxLat) maxLat = lat;
        }
      }
      const w = maxLng - minLng, h = maxLat - minLat;
      const pad = Math.max(w, h) * 0.06;

      // SVGのviewBox: x=minLng-pad, y=-(maxLat+pad), width=w+pad*2, height=h+pad*2
      // Y軸反転: lat → -lat （SVGはY軸下向きなので緯度を負にすれば北が上）
      const vbX = (minLng - pad).toFixed(4);
      const vbY = (-(maxLat + pad)).toFixed(4);
      const vbW = (w + pad * 2).toFixed(4);
      const vbH = (h + pad * 2).toFixed(4);
      const viewBox = `${vbX} ${vbY} ${vbW} ${vbH}`;

      // パス生成（lat を -lat に）
      const d = rings.map(pts => {
        if (pts.length < 2) return '';
        return 'M' + pts.map((p, i) =>
          (i===0?'':' L') + p[0].toFixed(4) + ',' + (-p[1]).toFixed(4)
        ).join('') + 'Z';
      }).join(' ');

      return { d, viewBox };
    }

    // 都道府県ごとにデータ生成
    const geoms = topo.objects.japan.geometries;
    prefData = geoms.map(geom => {
      const p = geom.properties;
      const name = p.nam_ja || '';
      if (!name) return null;
      const rings = geomToRings(geom);
      if (rings.length === 0) return null;
      const { d, viewBox } = makePathAndViewBox(rings);
      return { name, pathStr: d, viewBox };
    }).filter(Boolean);

    if (prefData.length === 0) throw new Error('データが0件でした');

    loadEl.style.display = 'none';
    svgEl.style.display = '';
    document.getElementById('rs-total').textContent = ` / ${prefData.length}`;
    startQuiz();

  } catch(e) {
    loadEl.style.display = 'none';
    errEl.innerHTML = `<strong>⚠️ エラー</strong><br><br>${e.message}<br><br>ページを再読み込みしてください。`;
    errEl.classList.add('show');
  }
}

// ── ゲームロジック ─────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz() {
  questionOrder = shuffle(prefData.map((_,i)=>i));
  currentIndex=0; correctCount=0; totalAnswered=0; answered=false;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('main').style.display='';
  document.getElementById('score-bar').style.display='';
  updateScore();
  loadQuestion();
}

function updateScore() {
  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-total').textContent = totalAnswered;
}

function loadQuestion() {
  answered = false;
  document.getElementById('next-btn').classList.remove('visible');
  const fb = document.getElementById('feedback-text');
  const ar = document.getElementById('answer-reveal');
  fb.className=''; ar.classList.remove('show'); ar.textContent='';

  const pref = prefData[questionOrder[currentIndex]];
  const svg  = document.getElementById('silhouette-svg');
  svg.setAttribute('viewBox', pref.viewBox);
  svg.innerHTML = `<path d="${pref.pathStr}"/>`;
  svg.className = '';

  const correct = pref.name;
  const wrongs  = shuffle(prefData.map(p=>p.name).filter(n=>n!==correct)).slice(0,3);
  const options = shuffle([correct,...wrongs]);

  document.querySelectorAll('.opt-btn').forEach((btn,i) => {
    btn.textContent = options[i];
    btn.disabled = false;
    btn.className = 'opt-btn';
    btn.onclick = () => checkAnswer(options[i], correct, btn);
  });

  const card = document.getElementById('quiz-card');
  card.classList.remove('fade-in'); void card.offsetWidth; card.classList.add('fade-in');
}

function checkAnswer(selected, correct, clickedBtn) {
  if (answered) return;
  answered=true; totalAnswered++;
  const isCorrect = selected===correct;
  if (isCorrect) correctCount++;
  updateScore();

  const svg = document.getElementById('silhouette-svg');
  const fb  = document.getElementById('feedback-text');
  const ar  = document.getElementById('answer-reveal');

  if (isCorrect) {
    svg.className='correct';
    fb.textContent='🎉 正解！'; fb.className='correct show';
    clickedBtn.classList.add('correct-answer');
  } else {
    svg.className='wrong';
    fb.textContent='❌ 不正解…'; fb.className='wrong show';
    ar.textContent=`正解は「${correct}」`; ar.classList.add('show');
    clickedBtn.classList.add('wrong-answer');
  }

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled=true;
    if (btn.textContent===correct && !isCorrect) btn.classList.add('correct-answer');
    else if (btn!==clickedBtn) btn.classList.add('dimmed');
  });

  if (currentIndex < prefData.length-1) {
    document.getElementById('next-btn').classList.add('visible');
  } else {
    setTimeout(showResult, 1400);
  }
}

document.getElementById('next-btn').addEventListener('click', ()=>{currentIndex++;loadQuestion();});

function showResult() {
  document.getElementById('main').style.display='none';
  document.getElementById('score-bar').style.display='none';
  document.getElementById('rs-correct').textContent=correctCount;
  document.getElementById('rs-total').textContent=` / ${prefData.length}`;
  const rate=correctCount/prefData.length;
  document.getElementById('result-msg').textContent=
    rate===1    ?'完璧です！全問正解、おめでとうございます🎊':
    rate>=0.8   ?'素晴らしい！地理の知識が豊富ですね🌟':
    rate>=0.6   ?'よくできました！あと少しで全問正解です💪':
    rate>=0.4   ?'半分以上正解！地道に練習しましょう📚':
                 '難しかったですね。繰り返し挑戦してみましょう🗾';
  document.getElementById('result-screen').classList.add('show');
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}

loadTopoJSON();
</script>
</body>
</html>
