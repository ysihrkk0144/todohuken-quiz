<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="都道府県クイズ">
<title>都道府県クイズ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;color:#2d2d48;overflow-x:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
    background:
      radial-gradient(ellipse at 10% 0%,rgba(108,99,255,.12) 0%,transparent 55%),
      radial-gradient(ellipse at 90% 100%,rgba(255,107,107,.09) 0%,transparent 55%),
      #f0f4ff;
    min-height:100vh;
    padding-bottom:90px;
  }

  /* ===== 結果通知バナー（インストール結果） ===== */
  #resultbanner{
    display:none;position:fixed;top:0;left:0;right:0;z-index:1000;
    padding:11px 44px 11px 16px;font-size:.85rem;font-weight:700;
    text-align:center;color:#fff;line-height:1.5;
  }
  #resultbanner.ok{background:#06d6a0;}
  #resultbanner.warn{background:#ff9f43;}
  #resultbanner .closeBtn{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:#fff;font-size:1.1rem;
    cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent;
  }

  /* ===== 更新確認バナー ===== */
  #updatebanner{
    display:none;position:fixed;bottom:0;left:0;right:0;z-index:1000;
    background:#2d2d48;color:#fff;padding:14px 16px;
    box-shadow:0 -4px 16px rgba(0,0,0,.2);
    align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  #updatebanner.show{display:flex;}
  #updatebanner .msg{font-size:.88rem;font-weight:700;flex:1;min-width:140px;}
  #updatebanner button{
    border:none;border-radius:10px;padding:8px 14px;
    font-size:.82rem;font-weight:700;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  #updatebanner .doUpdate{background:#06d6a0;color:#fff;}
  #updatebanner .later{background:#4a4a68;color:#fff;}

  /* ===== ヘッダー ===== */
  #header{
    text-align:center;padding:20px 16px 0;
    font-size:clamp(1.3rem,5.5vw,1.8rem);
    font-weight:700;color:#6c63ff;
    letter-spacing:.04em;
  }
  #header .icon{font-size:1.15em;margin-right:6px;}

  /* スコア */
  #score{
    display:inline-flex;align-items:center;gap:5px;
    background:#6c63ff;color:#fff;
    border-radius:24px;padding:5px 16px;
    font-size:.85rem;font-weight:700;
    box-shadow:0 2px 10px rgba(108,99,255,.28);
    margin:10px 0 0 16px;
  }
  #score .sc{font-size:1.1rem;color:#ffd93d;}
  #score .st{font-size:1.1rem;}

  /* 見出し */
  #question{
    text-align:center;color:#8888aa;
    padding:10px 16px 0;font-size:.95rem;font-weight:500;
  }

  /* カード */
  #card{
    margin:10px 16px 0;background:#fff;
    border-radius:22px;padding:16px;
    box-shadow:0 4px 24px rgba(108,99,255,.13);
    border:2px solid #e8e8f8;
    position:relative;overflow:hidden;
  }
  #card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,#6c63ff,#ff6b6b,#ffd93d);
  }

  /* シルエット枠 */
  #svgbox{
    width:100%;aspect-ratio:1/1;
    background:linear-gradient(135deg,#f5f6ff,#eaecff);
    border-radius:14px;border:2px solid #e8e8f8;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  #svgbox svg{width:82%;height:82%;display:block;}
  #svgbox svg path{
    fill:#6c63ff;opacity:.88;
    filter:drop-shadow(0 3px 8px rgba(108,99,255,.35));
    transition:fill .3s,filter .3s;
  }
  #svgbox svg.correct path{fill:#06d6a0;filter:drop-shadow(0 3px 12px rgba(6,214,160,.45));}
  #svgbox svg.wrong   path{fill:#ff6b6b;filter:drop-shadow(0 3px 12px rgba(255,107,107,.45));}

  /* ローディング・エラー */
  #loading{text-align:center;padding:40px 0;color:#8888aa;font-size:.9rem;}
  .spinner{
    width:32px;height:32px;margin:0 auto 10px;
    border:3px solid #e0e0f0;border-top-color:#6c63ff;
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #err{color:#ff6b6b;text-align:center;padding:20px;font-size:.85rem;line-height:1.7;display:none;}

  /* フィードバック */
  #feedback{
    min-height:38px;text-align:center;
    padding:8px 0 2px;
    font-size:1.15rem;font-weight:700;
    transition:opacity .3s;
  }
  #feedback.correct{color:#06d6a0;}
  #feedback.wrong{color:#ff6b6b;}
  #answerReveal{text-align:center;color:#8888aa;font-size:.85rem;min-height:18px;font-weight:500;}

  /* 選択肢 */
  #options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 16px 0;}
  .btn{
    background:#fff;border:2.5px solid #e0e0f0;border-radius:16px;
    color:#2d2d48;
    font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;
    font-size:clamp(.88rem,3.8vw,1.05rem);font-weight:700;
    padding:14px 8px;cursor:pointer;text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    transition:border-color .18s,background .18s,transform .12s;
    -webkit-tap-highlight-color:transparent;min-height:52px;
  }
  .btn:active:not(:disabled){transform:scale(.96);}
  .btn:disabled{cursor:default;transform:none;}
  .btn.ok{border-color:#06d6a0;color:#06d6a0;background:rgba(6,214,160,.10);}
  .btn.ng{border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,.10);}
  .btn.dim{opacity:.3;}

  /* 次へボタン */
  #nextbtn{
    display:none;margin:12px 16px 0;
    width:calc(100% - 32px);
    background:linear-gradient(135deg,#6c63ff,#8b85ff);
    border:none;border-radius:16px;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;
    font-size:1.08rem;font-weight:700;letter-spacing:.07em;
    padding:15px;cursor:pointer;
    box-shadow:0 4px 16px rgba(108,99,255,.32);
    -webkit-tap-highlight-color:transparent;
  }
  #nextbtn.show{display:block;}
  #nextbtn:active{opacity:.88;transform:scale(.98);}

  /* 結果画面 */
  #result{display:none;text-align:center;padding:48px 20px 32px;}
  #result.show{display:block;}
  #result .emoji{font-size:4rem;margin-bottom:8px;}
  #result h2{color:#6c63ff;font-size:2rem;margin-bottom:16px;font-weight:700;}
  #result .scoretxt{
    font-size:4rem;font-weight:700;
    color:#6c63ff;line-height:1;margin-bottom:8px;
  }
  #result .scoretxt span{font-size:1.5rem;color:#8888aa;}
  #result .msg{
    color:#8888aa;font-size:.95rem;line-height:1.7;
    background:#fff;border-radius:16px;padding:14px 20px;
    border:2px solid #e8e8f8;margin-bottom:24px;
  }
  #retrybtn{
    background:linear-gradient(135deg,#6c63ff,#8b85ff);
    border:none;border-radius:16px;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;
    font-size:1.1rem;font-weight:700;letter-spacing:.08em;
    padding:15px 48px;cursor:pointer;
    box-shadow:0 4px 18px rgba(108,99,255,.32);
  }

  /* フェードイン */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .fadein{animation:fadeUp .35s ease both;}

  /* ===== 診断パネル ===== */
  #diagFab{
    position:fixed;right:16px;bottom:16px;z-index:900;
    width:50px;height:50px;border-radius:50%;
    background:#2d2d48;color:#fff;border:none;
    font-size:1.3rem;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  #diagPanel{
    display:none;position:fixed;inset:0;z-index:1100;
    background:#161625;color:#e8e8f8;
    overflow-y:auto;
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:.78rem;line-height:1.6;
  }
  #diagPanel.show{display:block;}
  #diagHeader{
    position:sticky;top:0;background:#1f1f33;
    padding:14px 16px;display:flex;align-items:center;
    justify-content:space-between;border-bottom:1px solid #33334d;
  }
  #diagHeader h3{font-size:.95rem;color:#fff;font-family:-apple-system,sans-serif;}
  #diagClose{
    background:none;border:none;color:#fff;font-size:1.3rem;
    cursor:pointer;padding:4px 10px;-webkit-tap-highlight-color:transparent;
  }
  #diagBody{padding:14px 16px 100px;}
  .diagRow{
    display:flex;justify-content:space-between;gap:10px;
    padding:8px 0;border-bottom:1px solid #26263a;flex-wrap:wrap;
  }
  .diagRow .k{color:#9999bb;flex-shrink:0;}
  .diagRow .v{color:#e8e8f8;text-align:right;word-break:break-all;}
  .diagRow .v.good{color:#06d6a0;font-weight:700;}
  .diagRow .v.bad{color:#ff6b6b;font-weight:700;background:rgba(255,107,107,.12);padding:2px 8px;border-radius:6px;}
  .diagSection{
    margin-top:18px;color:#8b8bff;font-weight:700;
    font-family:-apple-system,sans-serif;font-size:.85rem;
  }
  .diagUrlList{
    margin-top:8px;background:#1f1f33;border-radius:8px;
    padding:10px 12px;max-height:200px;overflow-y:auto;
  }
  .diagUrlList div{padding:3px 0;color:#aaaacc;word-break:break-all;}
  .diagBtnRow{
    position:fixed;left:0;right:0;bottom:0;
    background:#1f1f33;padding:12px 16px;
    display:flex;gap:10px;border-top:1px solid #33334d;
  }
  .diagBtnRow button{
    flex:1;border:none;border-radius:10px;padding:12px 8px;
    font-size:.82rem;font-weight:700;cursor:pointer;
    font-family:-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #diagRefresh{background:#6c63ff;color:#fff;}
  #diagUpdateCheck{background:#06d6a0;color:#fff;}

  /* 下部余白 */
  #footer{height:24px;}
</style>
</head>
<body>

<!-- インストール結果バナー -->
<div id="resultbanner">
  <span id="resultbannerText"></span>
  <button class="closeBtn" id="resultbannerClose">✕</button>
</div>

<!-- 更新確認バナー -->
<div id="updatebanner">
  <span class="msg">🆕 新しいバージョンがあります</span>
  <div>
    <button class="doUpdate" id="doUpdateBtn">更新する</button>
    <button class="later" id="laterBtn">あとで</button>
  </div>
</div>

<div id="header"><span class="icon">🗾</span>都道府県クイズ</div>

<div id="score">
  <span>正答数</span>
  <span class="sc" id="sc">0</span>
  <span>/</span>
  <span class="st" id="st">0</span>
</div>

<p id="question">このシルエットは、どこの都道府県でしょう？</p>

<div id="card">
  <div id="svgbox">
    <div id="loading"><div class="spinner"></div>読み込み中…</div>
    <div id="err"></div>
  </div>
  <div id="feedback"></div>
  <div id="answerReveal"></div>
</div>

<div id="options">
  <button class="btn" id="b0"></button>
  <button class="btn" id="b1"></button>
  <button class="btn" id="b2"></button>
  <button class="btn" id="b3"></button>
</div>
<button id="nextbtn">次の問題へ ▶</button>

<div id="result">
  <div class="emoji" id="remoji">🎉</div>
  <h2>クイズ終了！</h2>
  <div class="scoretxt"><span id="rsc">0</span><span id="rst"> / 47</span></div>
  <div class="msg" id="rmsg"></div>
  <button id="retrybtn" onclick="init()">もう一度挑戦する 🔄</button>
</div>

<div id="footer"></div>

<!-- 診断パネル起動ボタン -->
<button id="diagFab" title="診断パネル">🔧</button>

<!-- 診断パネル -->
<div id="diagPanel">
  <div id="diagHeader">
    <h3>🔧 診断パネル</h3>
    <button id="diagClose">✕</button>
  </div>
  <div id="diagBody">

    <div class="diagSection">■ 基本情報</div>
    <div class="diagRow"><span class="k">現在のURL</span><span class="v" id="dUrl">-</span></div>
    <div class="diagRow"><span class="k">SW対応有無</span><span class="v" id="dSupport">-</span></div>

    <div class="diagSection">■ Service Worker登録状態</div>
    <div class="diagRow"><span class="k">登録scope</span><span class="v" id="dScope">-</span></div>
    <div class="diagRow"><span class="k">active</span><span class="v" id="dActive">-</span></div>
    <div class="diagRow"><span class="k">waiting</span><span class="v" id="dWaiting">-</span></div>
    <div class="diagRow"><span class="k">installing</span><span class="v" id="dInstalling">-</span></div>
    <div class="diagRow"><span class="k">controller</span><span class="v" id="dController">-</span></div>

    <div class="diagSection">■ キャッシュ状態</div>
    <div class="diagRow"><span class="k">SWバージョン(CACHE_NAME)</span><span class="v" id="dCacheName">-</span></div>
    <div class="diagRow"><span class="k">キャッシュ済み件数 / 期待件数</span><span class="v" id="dCacheCount">-</span></div>

    <div class="diagSection">■ キャッシュ済みURL一覧</div>
    <div class="diagUrlList" id="dUrlList">（未取得）</div>

    <div class="diagSection">■ 直近のinstall結果詳細</div>
    <div class="diagUrlList" id="dInstallDetail">（install未実行）</div>

  </div>
  <div class="diagBtnRow">
    <button id="diagRefresh">🔄 再取得</button>
    <button id="diagUpdateCheck">🌐 最新版を確認</button>
  </div>
</div>

<script>
/* ============================================================
   状態管理
============================================================ */
var swRegistration = null;
var lastInstallResult = null;

/* ============================================================
   結果バナー表示
============================================================ */
function showResultBanner(text, type) {
  var b = document.getElementById('resultbanner');
  b.textContent = '';
  var span = document.createElement('span');
  span.id = 'resultbannerText';
  span.textContent = text;
  var closeBtn = document.createElement('button');
  closeBtn.className = 'closeBtn';
  closeBtn.id = 'resultbannerClose';
  closeBtn.textContent = '✕';
  closeBtn.onclick = function () { b.style.display = 'none'; };
  b.appendChild(span);
  b.appendChild(closeBtn);
  b.className = type === 'ok' ? 'ok' : 'warn';
  b.style.display = 'block';
  setTimeout(function () { b.style.display = 'none'; }, 4000);
}

/* ============================================================
   Service Worker 初回登録
============================================================ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js', {
    scope: './',
    updateViaCache: 'none'
  }).then(function (reg) {
    swRegistration = reg;
    console.log('[Page] SW registered. scope=' + reg.scope);
    setupUpdateWatcher(reg);
    refreshDiagnostic();
  }).catch(function (err) {
    console.warn('[Page] SW registration failed:', err);
    refreshDiagnostic();
  });

  // SWからのpostMessageを受信
  navigator.serviceWorker.addEventListener('message', function (event) {
    var data = event.data || {};

    if (data.type === 'INSTALL_RESULT') {
      lastInstallResult = data;
      if (data.failedCount === 0) {
        showResultBanner('✅ オフライン準備完了！ (' + data.successCount + '/' + data.expectedCount + '件)', 'ok');
      } else {
        showResultBanner('⚠️ 一部未保存 (' + data.successCount + '/' + data.expectedCount + '件、失敗' + data.failedCount + '件)', 'warn');
      }
      refreshDiagnostic();
    }

    if (data.type === 'ACTIVATE_RESULT') {
      refreshDiagnostic();
    }

    if (data.type === 'DIAGNOSTIC_RESULT') {
      renderDiagnostic(data);
    }
  });

  // controllerが切り替わったらリロード（更新時のみ発生）
  var reloadingAfterUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    if (reloadingAfterUpdate) return;
    reloadingAfterUpdate = true;
    window.location.reload();
  });
}

/* ============================================================
   手動更新フロー
============================================================ */
function setupUpdateWatcher(reg) {
  reg.addEventListener('updatefound', function () {
    var newWorker = reg.installing;
    if (!newWorker) return;
    newWorker.addEventListener('statechange', function () {
      if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
        // 新バージョンのインストールが完了 → 更新確認バナー表示
        document.getElementById('updatebanner').classList.add('show');
      }
    });
  });
}

document.getElementById('doUpdateBtn').onclick = function () {
  if (swRegistration && swRegistration.waiting) {
    swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
  }
  document.getElementById('updatebanner').classList.remove('show');
};

document.getElementById('laterBtn').onclick = function () {
  document.getElementById('updatebanner').classList.remove('show');
};

function manualUpdateCheck() {
  if (!swRegistration) {
    alert('Service Workerが未登録です');
    return;
  }
  swRegistration.update().then(function () {
    console.log('[Page] update()チェック完了');
  }).catch(function (err) {
    console.warn('[Page] update()失敗:', err);
    alert('更新確認に失敗しました（オフラインの可能性があります）');
  });
}

/* ============================================================
   診断パネル
============================================================ */
document.getElementById('diagFab').onclick = function () {
  document.getElementById('diagPanel').classList.add('show');
  refreshDiagnostic();
};
document.getElementById('diagClose').onclick = function () {
  document.getElementById('diagPanel').classList.remove('show');
};
document.getElementById('diagRefresh').onclick = refreshDiagnostic;
document.getElementById('diagUpdateCheck').onclick = manualUpdateCheck;

function refreshDiagnostic() {
  document.getElementById('dUrl').textContent = location.href;
  document.getElementById('dSupport').textContent = ('serviceWorker' in navigator) ? '対応' : '非対応';

  if (!('serviceWorker' in navigator)) return;

  navigator.serviceWorker.getRegistration('./').then(function (reg) {
    if (!reg) {
      document.getElementById('dScope').textContent = '未登録';
      document.getElementById('dActive').textContent = '-';
      document.getElementById('dWaiting').textContent = '-';
      document.getElementById('dInstalling').textContent = '-';
      return;
    }
    document.getElementById('dScope').textContent = reg.scope;
    document.getElementById('dActive').textContent = reg.active ? (reg.active.state + ' ✓') : 'なし';
    document.getElementById('dWaiting').textContent = reg.waiting ? (reg.waiting.state + ' (更新待機中)') : 'なし';
    document.getElementById('dInstalling').textContent = reg.installing ? reg.installing.state : 'なし';
  });

  var controllerEl = document.getElementById('dController');
  if (navigator.serviceWorker.controller) {
    controllerEl.textContent = 'あり ✓';
    controllerEl.className = 'v good';
  } else {
    controllerEl.textContent = 'なし（要再読込 or 未登録）';
    controllerEl.className = 'v bad';
  }

  // SWにキャッシュ診断を依頼
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'GET_DIAGNOSTIC' });
  } else {
    document.getElementById('dCacheName').textContent = '(controller無し・取得不可)';
    document.getElementById('dCacheCount').textContent = '-';
    document.getElementById('dUrlList').textContent = '（controllerが無いため取得できません。一度ページを再読込してください）';
  }

  // install失敗詳細の表示
  var detailEl = document.getElementById('dInstallDetail');
  if (!lastInstallResult) {
    detailEl.textContent = '（このページ読み込みではinstallイベントが発火していません＝既にキャッシュ済みの可能性）';
  } else if (lastInstallResult.failedCount === 0) {
    detailEl.textContent = '✅ 全' + lastInstallResult.expectedCount + '件成功（エラーなし）';
  } else {
    detailEl.textContent = '';
    lastInstallResult.failedFiles.forEach(function (line) {
      var div = document.createElement('div');
      div.textContent = '❌ ' + line;
      detailEl.appendChild(div);
    });
  }
}

function renderDiagnostic(data) {
  document.getElementById('dCacheName').textContent = data.cacheName;

  var countEl = document.getElementById('dCacheCount');
  countEl.textContent = data.cachedCount + ' / ' + data.expectedCount;
  countEl.className = (data.cachedCount === data.expectedCount) ? 'v good' : 'v bad';

  var listEl = document.getElementById('dUrlList');
  listEl.textContent = '';
  if (!data.urls.length) {
    listEl.textContent = '（キャッシュ無し）';
  } else {
    data.urls.forEach(function (u) {
      var div = document.createElement('div');
      div.textContent = u;
      listEl.appendChild(div);
    });
  }
}

/* ============================================================
   都道府県シルエットクイズ ロジック
============================================================ */
var prefs = [], order = [], idx = 0, answered = false, correct = 0, total = 0;

fetch('./japan.topojson')
  .then(function (r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function (topo) {
    var sx = topo.transform.scale[0];
    var sy = topo.transform.scale[1];
    var tx = topo.transform.translate[0];
    var ty = topo.transform.translate[1];

    var arcs = topo.arcs.map(function (arc) {
      var x = 0, y = 0;
      return arc.map(function (p) {
        x += p[0]; y += p[1];
        return [x * sx + tx, y * sy + ty];
      });
    });

    function ring(indices) {
      var pts = [];
      for (var i = 0; i < indices.length; i++) {
        var n = indices[i];
        var arc = n < 0 ? arcs[~n].slice().reverse() : arcs[n];
        for (var j = 0; j < arc.length; j++) {
          if (j > 0 || pts.length === 0) pts.push(arc[j]);
        }
      }
      return pts;
    }

    function polyArea(pts) {
      var area = 0;
      for (var i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        area += (pts[j][0] + pts[i][0]) * (pts[j][1] - pts[i][1]);
      }
      return Math.abs(area / 2);
    }

    function getRings(geom, name) {
      var rs = [];
      if (geom.type === 'Polygon') {
        for (var i = 0; i < geom.arcs.length; i++) rs.push(ring(geom.arcs[i]));
      } else if (geom.type === 'MultiPolygon') {
        if (name === '東京都') {
          var best = null, bestArea = 0;
          for (var i = 0; i < geom.arcs.length; i++) {
            var outerPts = ring(geom.arcs[i][0]);
            var area = polyArea(outerPts);
            if (area > bestArea) { bestArea = area; best = i; }
          }
          if (best !== null) {
            for (var j = 0; j < geom.arcs[best].length; j++) rs.push(ring(geom.arcs[best][j]));
          }
        } else {
          for (var i = 0; i < geom.arcs.length; i++) {
            for (var j = 0; j < geom.arcs[i].length; j++) rs.push(ring(geom.arcs[i][j]));
          }
        }
      }
      return rs;
    }

    function makeSVGData(rs) {
      var minLng = 1e9, maxLng = -1e9, minLat = 1e9, maxLat = -1e9;
      for (var i = 0; i < rs.length; i++) {
        for (var j = 0; j < rs[i].length; j++) {
          var lng = rs[i][j][0], lat = rs[i][j][1];
          if (lng < minLng) minLng = lng; if (lng > maxLng) maxLng = lng;
          if (lat < minLat) minLat = lat; if (lat > maxLat) maxLat = lat;
        }
      }
      var w = maxLng - minLng, h = maxLat - minLat;
      var pad = Math.max(w, h) * 0.05;
      var vb = (minLng - pad).toFixed(4) + ' ' + (-(maxLat + pad)).toFixed(4) + ' ' + (w + pad * 2).toFixed(4) + ' ' + (h + pad * 2).toFixed(4);
      var d = '';
      for (var i = 0; i < rs.length; i++) {
        if (rs[i].length < 2) continue;
        d += 'M';
        for (var j = 0; j < rs[i].length; j++) {
          if (j > 0) d += ' L';
          d += rs[i][j][0].toFixed(4) + ',' + (-rs[i][j][1]).toFixed(4);
        }
        d += 'Z ';
      }
      return { vb: vb.trim(), d: d.trim() };
    }

    var geoms = topo.objects.japan.geometries;
    for (var i = 0; i < geoms.length; i++) {
      var name = (geoms[i].properties || {}).nam_ja || '';
      if (!name) continue;
      var rs = getRings(geoms[i], name);
      if (!rs.length) continue;
      var data = makeSVGData(rs);
      if (!data.d) continue;
      prefs.push({ name: name, vb: data.vb, d: data.d });
    }

    if (!prefs.length) throw new Error('データ0件');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('st').textContent = prefs.length;
    document.getElementById('rst').textContent = ' / ' + prefs.length;
    init();
  })
  .catch(function (e) {
    document.getElementById('loading').style.display = 'none';
    var el = document.getElementById('err');
    el.textContent = 'エラー: ' + e.message;
    el.style.display = 'block';
  });

function shuffle(a) {
  var b = a.slice();
  for (var i = b.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}

function init() {
  order = shuffle(prefs.map(function (_, i) { return i; }));
  idx = 0; correct = 0; total = 0; answered = false;
  document.getElementById('result').classList.remove('show');
  document.getElementById('card').style.display = '';
  document.getElementById('options').style.display = '';
  document.getElementById('nextbtn').classList.remove('show');
  document.getElementById('sc').textContent = 0;
  document.getElementById('st').textContent = prefs.length;
  show();
}

function show() {
  answered = false;
  var fb = document.getElementById('feedback');
  fb.textContent = ''; fb.className = '';
  document.getElementById('answerReveal').textContent = '';
  document.getElementById('nextbtn').classList.remove('show');

  var p = prefs[order[idx]];
  var box = document.getElementById('svgbox');
  var old = box.querySelector('svg');
  if (old) box.removeChild(old);

  var svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('viewBox', p.vb);
  svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  var pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  pathEl.setAttribute('d', p.d);
  svgEl.appendChild(pathEl);
  box.appendChild(svgEl);

  var card = document.getElementById('card');
  card.classList.remove('fadein');
  void card.offsetWidth;
  card.classList.add('fadein');

  var cname = p.name;
  var pool = shuffle(prefs.map(function (x) { return x.name; }).filter(function (n) { return n !== cname; })).slice(0, 3);
  var opts = shuffle([cname].concat(pool));
  var ids = ['b0', 'b1', 'b2', 'b3'];
  for (var i = 0; i < 4; i++) {
    var btn = document.getElementById(ids[i]);
    btn.textContent = opts[i];
    btn.disabled = false;
    btn.className = 'btn';
    btn.onclick = (function (sel) { return function () { answer(sel, cname); }; })(opts[i]);
  }
}

function answer(sel, cor) {
  if (answered) return;
  answered = true; total++;
  var isOk = sel === cor;
  if (isOk) correct++;
  document.getElementById('sc').textContent = correct;
  document.getElementById('st').textContent = total;

  var svgEl = document.getElementById('svgbox').querySelector('svg');
  if (svgEl) svgEl.className = isOk ? 'correct' : 'wrong';

  var fb = document.getElementById('feedback');
  fb.textContent = isOk ? '🎉 正解！' : '❌ 不正解…';
  fb.className = isOk ? 'correct' : 'wrong';
  if (!isOk) document.getElementById('answerReveal').textContent = '正解は「' + cor + '」';

  var ids = ['b0', 'b1', 'b2', 'b3'];
  for (var i = 0; i < 4; i++) {
    var btn = document.getElementById(ids[i]);
    btn.disabled = true;
    if (btn.textContent === cor && !isOk) btn.className = 'btn ok';
    else if (btn.textContent === sel && !isOk) btn.className = 'btn ng';
    else if (btn.textContent !== sel && btn.textContent !== cor) btn.className = 'btn dim';
  }

  if (idx < prefs.length - 1) {
    document.getElementById('nextbtn').classList.add('show');
  } else {
    setTimeout(result, 1200);
  }
}

document.getElementById('nextbtn').onclick = function () { idx++; show(); };

function result() {
  document.getElementById('card').style.display = 'none';
  document.getElementById('options').style.display = 'none';
  document.getElementById('nextbtn').classList.remove('show');
  var rate = correct / prefs.length;
  document.getElementById('rsc').textContent = correct;
  document.getElementById('rst').textContent = ' / ' + prefs.length;
  document.getElementById('remoji').textContent = rate === 1 ? '🏆' : rate >= 0.8 ? '🌟' : rate >= 0.6 ? '👍' : rate >= 0.4 ? '📚' : '🗾';
  document.getElementById('rmsg').textContent =
    rate === 1   ? '完璧です！全問正解、おめでとうございます🎊' :
    rate >= 0.8  ? '素晴らしい！地理の知識が豊富ですね🌟' :
    rate >= 0.6  ? 'よくできました！あと少しで全問正解です💪' :
    rate >= 0.4  ? '半分以上正解！地道に練習しましょう📚' :
                   '難しかったですね。繰り返し挑戦してみましょう🗾';
  document.getElementById('result').classList.add('show');
}
</script>
